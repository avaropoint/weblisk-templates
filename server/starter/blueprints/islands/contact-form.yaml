type: island
name: contact-form
protocol: agent
agent: contact
action: submit

fields:
  - name: name
    type: text
    required: true
    label: "Your name"
  - name: email
    type: email
    required: true
    label: "Email address"
  - name: message
    type: textarea
    required: true
    label: "Message"
    rows: 4

behavior:
  validate: on-blur
  submit: agent:contact.submit
  success: "Thanks! We'll be in touch."
  error: "Something went wrong. Please try again."
  reset_on_success: true

accessibility:
  role: form
  aria_label: "Contact form"
  error_announcement: assertive
  required_indicator: "(required)"
