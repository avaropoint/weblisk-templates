# Override: contact form island — server-backed variant.
# Extends the client/starter version, changing only the protocol.
#
# Client version:  protocol: none  → mailto fallback
# Server version:  protocol: agent → routed through gateway to contact agent

extends: client/starter/blueprints/islands/contact-form

# --- Overrides ---
protocol: agent
agent: contact
action: submit

behavior:
  validate: on-blur
  submit: agent:contact.submit
  success: "Thanks! We'll be in touch."
  error: "Something went wrong. Please try again."
  reset_on_success: true
  aria_label: "Contact form"
  error_announcement: assertive
  required_indicator: "(required)"
