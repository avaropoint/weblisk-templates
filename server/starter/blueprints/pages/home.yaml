type: page
route: /
title: "Home"
layout: hero-split

sections:
  - type: hero
    heading: "{{name}}"
    subheading: "Built entirely with blueprints"
    cta:
      text: "Learn More"
      href: /about

  - type: features
    heading: "How It Works"
    source: content/features.yaml
    columns: 3
    icon_style: outline

  - type: island
    blueprint: islands/contact-form
    heading: "Get in Touch"

seo:
  title: "{{name}} — Built with Weblisk Blueprints"
  description: "A website described in YAML and generated by AI."

structured_data:
  type: WebSite
  name: "{{name}}"
  url: "https://{{domain}}"
