name: "{{name}}"
domain: "{{domain}}"
locale: en-US
locales: [en-US]

brand:
  colors:
    primary: "#1a1a2e"
    accent: "#e94560"
    surface: "#ffffff"
    text: "#1a1a1a"
    muted: "#6b7280"
    error: "#dc2626"
    success: "#16a34a"
  typography:
    heading: { family: "Inter", weight: 700 }
    body: { family: "system-ui", weight: 400 }
    mono: { family: "JetBrains Mono", weight: 400 }
  spacing: 8px
  radius: 4px
  logo: assets/logo.svg
  favicon: assets/logo.svg

identity:
  tagline: "Built with blueprints"
  description: "A website described entirely in YAML, generated by AI."
  legal_name: "{{name}}"
  copyright_year: 2026

social:
  og_default_image: null

policies:
  accessibility: WCAG-2.2-AA
  seo: strict
  structured_data: required
  social_meta: required
  performance:
    lcp: 2500
    cls: 0.1
    inp: 200

dependencies: []
