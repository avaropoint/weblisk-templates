# Website Domain Controller
# Blueprint: https://github.com/avaropoint/weblisk-blueprints/blob/main/architecture/domain.md
#
# This domain owns the website's interactive workflows. The CLI + LLM
# generates the implementation from this spec and the platform blueprint.
#
# Request flow:
#   Client → POST /islands/home/contact-form
#   Gateway → routes to this domain (port 9700)
#   Domain  → triggers 'contact' workflow
#   Workflow → dispatches to contact agent (port 9710)
#   Agent   → validates, stores, returns response
#   Domain  → returns result to gateway → client island

name: website
version: 1.0.0

workflows:
  contact:
    trigger: gateway
    description: "Process a contact form submission"
    phases:
      - name: validate-and-store
        agent: contact
        action: submit
        input:
          name: "$.payload.name"
          email: "$.payload.email"
          message: "$.payload.message"
        output:
          id: "$.result.id"
          status: "$.result.status"
        timeout: 5000
        on_error: fail

islands:
  home:
    contact-form:
      workflow: contact
      action: submit
      method: POST
      content_type: application/json
