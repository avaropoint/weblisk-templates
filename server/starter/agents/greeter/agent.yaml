# Greeter Agent
# Blueprint: https://github.com/avaropoint/weblisk-blueprints/blob/main/architecture/agent.md
#
# This file is the agent specification. The CLI + LLM generates the
# implementation from this spec and the platform blueprint (Go, Node, etc.).

name: greeter
version: 1.0.0
type: work
domain: greeting

capabilities:
  - text:generate

actions:
  greet:
    input:
      name: { type: string, default: "World" }
    output:
      greeting: { type: string }
    description: Generate a greeting message
