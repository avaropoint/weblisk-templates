# Contact Agent
# Blueprint: https://github.com/avaropoint/weblisk-blueprints/blob/main/architecture/agent.md
#
# Handles contact form submissions — validates input, stores the message,
# and optionally sends a notification. The CLI + LLM generates the
# implementation from this spec and the platform blueprint.

name: contact
version: 1.0.0
type: work
domain: website

capabilities:
  - data:validate
  - data:store
  - notification:send

actions:
  submit:
    description: "Validate and store a contact form submission"
    input:
      name: { type: string, required: true, max_length: 100 }
      email: { type: string, format: email, required: true }
      message: { type: string, required: true, max_length: 5000 }
    output:
      id: { type: string, description: "Stored submission ID" }
      status: { type: string, enum: [received, error] }
    on_success:
      - notification:send
        channel: email
        to: "{{admin_email}}"
        subject: "New contact: {name}"
