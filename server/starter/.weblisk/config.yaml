# Weblisk Hub Configuration — Starter Template
# See: https://github.com/avaropoint/weblisk-blueprints/blob/main/schemas/config.md

hub:
  name: "{{name}}"
  version: 1.0.0

orchestrator:
  port: 9800
  storage: memory

gateway:
  port: 8080
  tls: false
  static_dir: public
  auth: none
  rate_limit: 100/min

domains:
  - name: website
    port: 9700

agents:
  - name: contact
    type: work
    domain: website
    port: 9710
