<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — My App</title>
  <meta name="description" content="Application dashboard.">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#3B4F7C">
  <link rel="stylesheet" href="/css/styles.css">
  <script>document.documentElement.dataset.theme=localStorage.getItem('wl-theme')||'light'</script>
  <script type="importmap">
  { "imports": { "weblisk": "https://cdn.weblisk.dev/weblisk.js", "weblisk/": "https://cdn.weblisk.dev/" } }
  </script>
</head>
<body>

  <a href="#main-content" class="wl-skip-link">Skip to main content</a>
  <nav class="wl-nav" aria-label="Main navigation">
    <a href="/index.html"><strong>My App</strong></a>
    <a href="/dashboard.html">Dashboard</a>
    <a href="/settings.html">Settings</a>
    <div class="wl-theme-toggle" data-island="/js/islands/theme-toggle.js" data-hydrate="idle">
      <button type="button" aria-label="Toggle theme">🌙</button>
    </div>
  </nav>

  <main id="main-content">
    <section class="page">
      <h1>Dashboard</h1>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1rem;padding:1rem 0">
        <div style="padding:1.5rem;border:1px solid #ddd;border-radius:8px">
          <h2>Users</h2>
          <p style="font-size:2rem;font-weight:700">1,234</p>
        </div>
        <div style="padding:1.5rem;border:1px solid #ddd;border-radius:8px">
          <h2>Revenue</h2>
          <p style="font-size:2rem;font-weight:700">$45,678</p>
        </div>
        <div style="padding:1.5rem;border:1px solid #ddd;border-radius:8px">
          <h2>Active Sessions</h2>
          <p style="font-size:2rem;font-weight:700">89</p>
        </div>
        <div style="padding:1.5rem;border:1px solid #ddd;border-radius:8px"
             data-island="/js/islands/counter.js" data-hydrate="visible">
          <h2>Live Counter</h2>
          <button style="font-size:2rem;font-weight:700;background:none;border:none;cursor:pointer;color:inherit;padding:0">Count: 0</button>
        </div>
      </div>
    </section>
  </main>

  <footer class="wl-footer">
    Built with Weblisk &middot; &copy; <span class="wl-year"></span>
  </footer>

  <script type="module" src="/js/islands/shell.js"></script>
  <script>document.querySelectorAll('.wl-year').forEach(el=>el.textContent=new Date().getFullYear())</script>
</body>
</html>
