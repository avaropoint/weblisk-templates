<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — My App</title>
  <meta name="description" content="Application dashboard.">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#3B4F7C">
  <link rel="stylesheet" href="/css/styles.css">
  <script>document.documentElement.dataset.theme=localStorage.getItem('wl-theme')||'light'</script>
  <script type="importmap">
  { "imports": { "weblisk": "https://cdn.weblisk.dev/weblisk.js", "weblisk/": "https://cdn.weblisk.dev/" } }
  </script>
</head>
<body>

  <a href="#main-content" class="wl-skip-link">Skip to main content</a>
  <nav class="wl-nav" aria-label="Main navigation">
    <a href="/index.html"><strong>My App</strong></a>
    <a href="/dashboard.html">Dashboard</a>
    <a href="/settings.html">Settings</a>
    <div class="wl-theme-toggle" data-island="/js/islands/theme-toggle.js" data-hydrate="idle">
      <button type="button" aria-label="Toggle theme">🌙</button>
    </div>
  </nav>

  <main id="main-content">
    <section class="page">
      <h1>Dashboard</h1>

      <div class="card-grid">
        <div class="card card-stat">
          <h2>Users</h2>
          <p class="stat-value">1,234</p>
        </div>
        <div class="card card-stat">
          <h2>Revenue</h2>
          <p class="stat-value">$45,678</p>
        </div>
        <div class="card card-stat">
          <h2>Active Sessions</h2>
          <p class="stat-value">89</p>
        </div>
        <div class="card" data-island="/js/islands/counter.js" data-hydrate="visible">
          <h2>Live Counter</h2>
          <p>Count: <span class="counter-value">0</span></p>
          <button class="btn counter-btn" type="button">+1</button>
        </div>
      </div>
    </section>
  </main>

  <footer class="wl-footer">
    Built with <a href="https://weblisk.dev">Weblisk</a> &middot; &copy; <span class="wl-year"></span>
  </footer>

  <script type="module" src="/js/islands/shell.js"></script>
  <script>document.querySelectorAll('.wl-year').forEach(el=>el.textContent=new Date().getFullYear())</script>
</body>
</html>
