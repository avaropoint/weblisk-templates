fonts:
  - family: "Inter"
    source: "https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    weight: [400, 500, 600, 700]
    display: swap
    preload: true
    fallback: "system-ui, -apple-system, sans-serif"

  - family: "JetBrains Mono"
    source: "https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&display=swap"
    weight: [400]
    display: swap
    preload: false
    fallback: "ui-monospace, monospace"

responsive_images:
  rules:
    hero:
      breakpoints:
        sm: { width: 640, quality: 80 }
        md: { width: 768, quality: 80 }
        lg: { width: 1024, quality: 85 }
        xl: { width: 1280, quality: 85 }
      format: [avif, webp, png]
      loading: eager
      fetchpriority: high
    content:
      breakpoints:
        sm: { width: 640, quality: 75 }
        md: { width: 768, quality: 80 }
      format: [avif, webp, png]
      loading: lazy
      placeholder: blur
