extends: global.brand

scales:
  spacing: [0, 4, 8, 12, 16, 24, 32, 48, 64, 96, 128]
  font_size: [12, 14, 16, 18, 20, 24, 30, 36, 48, 60]
  line_height: [1, 1.25, 1.375, 1.5, 1.625, 2]
  font_weight: [400, 500, 600, 700]
  radius: [0, 2, 4, 6, 8, 12, 16, 9999]
  opacity: [0, 0.05, 0.1, 0.2, 0.4, 0.6, 0.8, 1]
  z_index: [0, 10, 20, 30, 40, 50]

breakpoints:
  sm: 640px
  md: 768px
  lg: 1024px
  xl: 1280px
  xxl: 1536px

layout:
  max_width: 1200px
  gutter: 16px
  columns: 12
  container_padding:
    sm: 16px
    md: 24px
    lg: 32px

shadows:
  sm: "0 1px 2px rgba(0,0,0,0.05)"
  md: "0 4px 6px rgba(0,0,0,0.07)"
  lg: "0 10px 15px rgba(0,0,0,0.1)"
  xl: "0 20px 25px rgba(0,0,0,0.1)"

transitions:
  fast: 150ms ease
  normal: 250ms ease
  slow: 400ms ease

focus:
  ring_width: 2px
  ring_color: from-brand-focus
  ring_offset: 2px
  ring_style: solid
  visible_only: focus-visible

motion:
  reduced: respect
  prefers_reduced_motion: remove-animations

dark:
  colors:
    primary: "#e2e2f0"
    surface: "#0f0f0f"
    text: "#e5e5e5"
    muted: "#9ca3af"
    border: "#2d2d2d"
    focus: "#60a5fa"
