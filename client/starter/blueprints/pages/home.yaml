type: page
route: /
title: "Home"
layout: hero-split

components:
  header: components/nav
  footer: components/footer

sections:
  - type: hero
    heading: "{{name}}"
    subheading: "Built entirely with blueprints"
    body: "Describe your website in YAML. Let AI generate production-ready code. Ship without a bundler."
    cta:
      primary:
        text: "Get Started"
        href: /about
        aria_label: "Learn more about {{name}}"
      secondary:
        text: "View on GitHub"
        href: "https://github.com"
        rel: noopener
        aria_label: "View source code on GitHub"
    image:
      src: assets/logo.svg
      alt: "{{name}} logo"
      width: 400
      height: 400
      loading: eager
      fetchpriority: high

  - type: features
    heading: "How It Works"
    subheading: "Three steps from blueprint to production"
    source: content/features.yaml
    columns: 3
    icon_style: outline
    icon_size: 48

  - type: island
    blueprint: islands/contact-form
    heading: "Get in Touch"
    subheading: "Have a question? We'd love to hear from you."
    id: contact

seo:
  title: "{{name}} — Build Websites with YAML Blueprints"
  description: "{{name}} is a blueprint-driven web framework. Describe your site in YAML, generate production-ready code with AI, and ship without a bundler."
  canonical: "https://{{domain}}/"
  sitemap_priority: 1.0
  sitemap_changefreq: weekly

social_meta:
  og_type: website
  og_title: "{{name}} — Build Websites with YAML Blueprints"
  og_description: "Describe your site in YAML, generate production-ready code with AI."
  og_url: "https://{{domain}}/"
  og_image: null
  twitter_card: summary_large_image

structured_data:
  - type: WebSite
    name: "{{name}}"
    url: "https://{{domain}}"
    description: "A blueprint-driven web framework"
    potentialAction:
      type: SearchAction
      target: "https://{{domain}}/search?q={search_term_string}"
      query-input: "required name=search_term_string"
  - type: Organization
    name: "{{name}}"
    url: "https://{{domain}}"
    logo: "https://{{domain}}/assets/logo.svg"
    contactPoint:
      type: ContactPoint
      contactType: "customer service"
      email: "hello@{{domain}}"
  - type: FAQPage
    mainEntity:
      - question: "What is {{name}}?"
        answer: "{{name}} is a blueprint-driven web framework where you describe your website in YAML and AI generates production-ready code."
      - question: "How does blueprint-driven development work?"
        answer: "You write YAML blueprints that declare what your site should be — pages, components, and interactions. The CLI sends these to an LLM which generates HTML, CSS, and JavaScript."
      - question: "Do I need a build step?"
        answer: "No. Generated code runs directly in the browser using ES modules and import maps. No bundler, no transpiler, no framework lock-in."
  - type: WebPage
    name: "Home"
    speakable:
      type: SpeakableSpecification
      cssSelector: [".hero-heading", ".hero-subheading", ".hero-body"]
