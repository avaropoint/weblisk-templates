type: page
route: /about
title: "About"
layout: default

sections:
  - type: content
    heading: "About Us"
    body: |
      We believe the best code is a byproduct of a good blueprint.
      This site is described entirely in YAML — no hand-written HTML,
      CSS, or JavaScript. Every page, component, and interaction is
      declared, then generated.

  - type: grid
    heading: "Our Team"
    source: content/team.yaml
    columns: 2
    card_variant: compact

seo:
  title: "About — {{name}}"
  description: "Learn about our blueprint-driven approach to building for the web."

structured_data:
  type: AboutPage
  name: "About {{name}}"
